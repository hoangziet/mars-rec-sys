# configs/model/gsasrec.yaml
name: gsasrec
model_kwargs:
  hidden_dim: 64
  num_heads: 2
  num_layers: 2
  dropout: 0.2
  t: 0.5
  num_neg: 32
  pos_smoothing: 0.0
train_kwargs:
  batch_size: 32
  epochs: 100
  lr: 1e-3
  weight_decay: 1e-4
  beta2: 0.98
  max_len: 50
  gradient_clip: 5.0
  early_stop_patience: 20
  early_stop_min_delta: 1e-4
  confidence_alpha: 0.0
