# configs/model/gsasrec_combined.yaml
# RQ4 V3: gSASRec with confidence + metadata
name: gsasrec
model_kwargs:
  hidden_dim: 64
  num_heads: 2
  num_layers: 2
  dropout: 0.2
  t: 0.5
  num_neg: 32
  pos_smoothing: 0.0
  item_encoder:
    use_structured: true
    use_text: true
    text_emb_path: data/processed/item_features/text_embeddings.pt
    metadata_vocab_path: data/processed/item_features/metadata_vocab.json
    metadata_csv_path: data/processed/item_features/item_metadata.csv
train_kwargs:
  batch_size: 128
  epochs: 50
  lr: 1e-3
  weight_decay: 0.0
  beta2: 0.98
  max_len: 50
  num_neg: 32
  gradient_clip: 5.0
  early_stop_patience: 10
  early_stop_min_delta: 1e-4
  confidence_alpha: 0.5
