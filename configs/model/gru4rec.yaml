# configs/model/gru4rec.yaml
name: gru4rec
model_kwargs:
  emb_dim: 64
  hidden_dim: 128
  num_layers: 1
  dropout: 0.2
train_kwargs:
  batch_size: 32
  epochs: 100
  lr: 1e-3
  weight_decay: 1e-4
  beta2: 0.98
  max_len: 50
  num_neg: 32
  gradient_clip: 5.0
  early_stop_patience: 20
  early_stop_min_delta: 1e-4
  loss_type: bpr_max
  confidence_alpha: 0.0
