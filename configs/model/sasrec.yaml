# configs/model/sasrec.yaml
name: sasrec
model_kwargs:
  hidden_dim: 64
  num_heads: 2
  num_layers: 2
  dropout: 0.2
  norm_first: true
train_kwargs:
  batch_size: 256
  epochs: 50
  lr: 1e-3
  weight_decay: 1e-4
  beta2: 0.98
  max_len: 50
  gradient_clip: 5.0
  early_stop_patience: 10
  early_stop_min_delta: 1e-4
  confidence_alpha: 0.0
